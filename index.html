<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI 性格测试 | 傻大个性格测试</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --accent-pink: #e94560;
            --accent-purple: #533483;
            --accent-cyan: #0f3460;
            --text-light: #eaeaea;
            --text-muted: #a0a0a0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(233, 69, 96, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(83, 52, 131, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(15, 52, 96, 0.1) 0%, transparent 70%);
        }
        
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }
        
        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            background: var(--accent-pink);
            border-radius: 50%;
            left: 10%;
            top: 20%;
            animation-delay: 0s;
        }
        
        .shape:nth-child(2) {
            width: 120px;
            height: 120px;
            background: var(--accent-purple);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            right: 15%;
            top: 30%;
            animation-delay: -5s;
        }
        
        .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            background: var(--accent-cyan);
            left: 70%;
            bottom: 20%;
            animation-delay: -10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* 首页 */
        .landing {
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        
        .tagline {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .tagline span {
            color: var(--accent-pink);
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        
        .feature {
            background: var(--bg-card);
            padding: 20px 30px;
            border-radius: 16px;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        
        .feature-number {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-pink);
        }
        
        .feature-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }
        
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.4);
        }
        
        .disclaimer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* 测试页面 */
        .quiz-container {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .progress-bar {
            background: var(--bg-card);
            height: 8px;
            border-radius: 4px;
            margin-bottom: 40px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple));
            height: 100%;
            border-radius: 4px;
            transition: width 0.4s ease;
        }
        
        .question-counter {
            text-align: center;
            color: var(--accent-pink);
            font-weight: 700;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        
        .question {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .option {
            background: var(--bg-card);
            border: 2px solid transparent;
            padding: 20px 25px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            text-align: center;
        }
        
        .option:hover {
            border-color: var(--accent-pink);
            transform: translateX(10px);
        }
        
        .option.selected {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.2), rgba(83, 52, 131, 0.2));
            border-color: var(--accent-pink);
        }
        
        /* 结果页面 */
        .result-container {
            display: none;
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .result-emoji {
            font-size: 6rem;
            margin-bottom: 20px;
        }
        
        .result-type {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .result-title {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        
        .result-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        
        .result-description {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .traits {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .trait {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.2), rgba(83, 52, 131, 0.2));
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .dimensions {
            text-align: left;
            margin-top: 30px;
        }
        
        .dimension {
            margin-bottom: 20px;
        }
        
        .dimension-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .dimension-bar {
            background: var(--bg-dark);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .dimension-fill {
            height: 100%;
            border-radius: 5px;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple));
            transition: width 1s ease;
        }
        
        .share-btn {
            background: var(--bg-card);
            color: var(--text-light);
            border: 2px solid var(--accent-pink);
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 15px;
        }
        
        .share-btn:hover {
            background: var(--accent-pink);
        }
        
        .restart-btn {
            background: transparent;
            color: var(--text-muted);
            border: 2px solid var(--text-muted);
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .restart-btn:hover {
            border-color: var(--text-light);
            color: var(--text-light);
        }
        
        @media (max-width: 600px) {
            .logo { font-size: 3.5rem; }
            .tagline { font-size: 1.2rem; }
            .features { gap: 15px; }
            .feature { padding: 15px 20px; }
            .question { font-size: 1.2rem; }
            .result-type { font-size: 2rem; }
        }
    </style>
</head>

        let answers = [];
        
        function startQuiz() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            showQuestion();
        }
        
        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionCounter').textContent = `第 ${currentQuestion + 1} / ${questions.length} 题`;
            document.getElementById('questionText').textContent = q.q;
            
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
        }
        
        function selectOption(idx) {
            answers.push(idx);
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }
        
        function calculateResult() {
            // 简化的计分逻辑
            const scores = { ZZZZ: 0, MALO: 0, DEAD: 0, SHIT: 0, DRUNK: 0, SEXY: 0, ATM: 0, FOOL: 0, LOVE: 0, WORK: 0, JOKER: 0, BOSS: 0 };
            
            answers.forEach((ans, idx) => {
                const q = questions[idx];
                // 根据答案和题目类型给不同维度加分
                if (idx % 3 === 0) scores.ZZZZ += (3 - ans);
                if (idx % 4 === 0) scores.MALO += ans;
                if (idx % 5 === 0) scores.DEAD += (3 - ans);
                if (ans === 0) scores.SHIT += 1;
                if (ans === 2 && idx > 20) scores.DRUNK += 1;
                if (ans === 3 && idx < 10) scores.SEXY += 1;
                if (ans === 0 && idx > 15) scores.ATM += 1;
                if (ans === 3) scores.FOOL += 1;
                if (idx > 25 && ans < 2) scores.LOVE += 1;
                if (ans === 0 && idx > 5 && idx < 15) scores.WORK += 1;
                if (idx > 20 && ans === 0) scores.JOKER += 1;
                if (ans === 2) scores.BOSS += 1;
            });
            
            // 找出最高分
            let maxScore = 0;
            let resultType = 'ZZZZ';
            for (const [type, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    resultType = type;
                }
            }
            
            return resultType;
        }
        
        function showResult() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            
            const resultType = calculateResult();
            const result = results[resultType];
            
            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultType').textContent = result.name;
            document.getElementById('resultTitle').textContent = resultType;
            document.getElementById('resultDescription').textContent = result.desc;
            
            const traitsContainer = document.getElementById('traits');
            traitsContainer.innerHTML = '';
            result.traits.forEach(trait => {
                const span = document.createElement('span');
                span.className = 'trait';
                span.textContent = trait;
                traitsContainer.appendChild(span);
            });
            
            const dimensionsContainer = document.getElementById('dimensions');
            dimensionsContainer.innerHTML = '';
            for (const [dim, value] of Object.entries(result.dimensions)) {
                const div = document.createElement('div');
                div.className = 'dimension';
                div.innerHTML = `
                    <div class="dimension-label">
                        <span>${dim}</span>
                        <span>${value}%</span>
                    </div>
                    <div class="dimension-bar">
                        <div class="dimension-fill" style="width: 0%"></div>
                    </div>
                `;
                dimensionsContainer.appendChild(div);
                
                // 动画
                setTimeout(() => {
                    div.querySelector('.dimension-fill').style.width = value + '%';
                }, 100);
            }
        }
        
        function shareResult() {
            const resultType = document.getElementById('resultTitle').textContent;
            const resultName = document.getElementById('resultType').textContent;
            const text = `我的 SBTI 人格是【${resultName}】(${resultType})！快来测测你的吧~`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'SBTI 性格测试',
                    text: text,
                    url: window.location.href
                });
            } else {
                // 复制到剪贴板
                navigator.clipboard.writeText(text + ' ' + window.location.href).then(() => {
                    alert('结果已复制到剪贴板！');
                });
            }
        }
        
        function restartQuiz() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('result').style.display = 'none';
            document.getElementById('landing').style.display = 'block';
        }
    </script>
</body>
</html>
